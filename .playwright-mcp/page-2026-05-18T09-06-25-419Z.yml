      - code [ref=e148]: "// Domain : Interface interface MonRepository { public function find(Uuid $id): ?MonEntity; public function enregistrer(MonEntity $entity): void; } // Infrastructure : Implémentation Doctrine readonly class DoctrineMonRepository implements MonRepository { public function __construct( private EntityManagerInterface $em, ) {} public function find(Uuid $id): ?MonEntity { return $this->em->find(MonEntity::class, $id); } public function enregistrer(MonEntity $entity): void { $this->em->persist($entity); $this->em->flush(); } }"
